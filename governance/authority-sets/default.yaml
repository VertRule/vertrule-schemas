# Authority set for vr-definitions (mirrors root)
#
# Inherits from repository-level authority set.
# Override only when crate-specific authority is needed.

authority_set_id: "repo-default"

authorities:
  - "000000000000000000000000"
  - "111111111111111111111111"

threshold: 1

roles:
  "000000000000000000000000": signer
  "111111111111111111111111": auditor
